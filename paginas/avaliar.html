<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../imagens/favicon.png" type="image/png">
    <title>Avaliar - giveSTAR</title>
  </head>

  <body class="avaliar">

<form id="form-avaliacao">

    <h3 id="titulo-avaliacao"></h3>

    <div class="avaliacao-estrelas">

        <span class="estrela" data-valor="1">★</span>
        <span class="estrela" data-valor="2">★</span>
        <span class="estrela" data-valor="3">★</span>
        <span class="estrela" data-valor="4">★</span>
        <span class="estrela" data-valor="5">★</span>

    </div>

    <p id="nota-escolhida">
        Nota: 0/5
    </p>

    <input type="hidden" id="nota" value="0">

    <label for="review">Sua avaliação:</label>

    <textarea
        id="nova-review"
        rows="8"
        maxlength="500"
        placeholder="Escreva sua opinião..."
    ></textarea>

    <p id="contador">
        0/500 caracteres
    </p>

    <button type="submit">
        Enviar avaliação
    </button>

</form>

  <script src="../js/avaliar.js"></script>
    
</body>

</html>
