<html>
  <head>
    <title>Meu Site</title>

    <style>
      body.dark {
        background-color: #0b0b0b;
        color: #c0c0c0;
      }

      body.light {
        background-color: #ffffff;
        color: #000000;
      }
    </style>
  </head>

  <body class="dark">

    <button onclick="trocarTema()">🌙 / ☀️</button>

    <h1>
      <img src="imagens/giveSTAR_logo.png" width="200">
    </h1>

    <h2>Site de avaliação - Desenvolvimento WEB</h2>

    <script>
      function trocarTema() {
        const body = document.body;

        if (body.classList.contains("dark")) {
          body.classList.replace("dark", "light");
        } else {
          body.classList.replace("light", "dark");
        }
      }
    </script>

  </body>
</html>
